{% extends "base.html" %}

{% block content %}

<h1>Update User Profile</h1>

<form method="POST">

    <label>Full Name</label>
    <input 
        type="text" 
        name="full_name" 
        value="{{ full_name or user.full_name }}"
        required
    >

    <label>Email Address</label>
    <input 
        type="email" 
        name="email" 
        value="{{ email or user.email }}"
        required
    >

    <label>Phone Number</label>
    <input 
        type="text" 
        name="phone" 
        value="{{ phone or user.phone }}"
        required
    >

    <label>Short Bio</label>
    <textarea name="bio" required>{{ bio or user.bio }}</textarea>

    <button type="submit">Save Changes</button>

</form>

{% endblock %}
